name: Daily Dashboard Update

on:
  schedule:
    # KST 11:13 / 11:37 / 11:57 (UTC 02:13 / 02:37 / 02:57) — 매일 3중 트리거
    # 정시(02:00) 회피 + GitHub Actions cron 누락 대비. 두 번 실행돼도 idempotent하므로 안전.
    - cron: '13 2 * * *'
    - cron: '37 2 * * *'
    - cron: '57 2 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: '대상 날짜 YYYY-MM-DD (콤마/공백 구분. 비워두면 자동: 평일=어제, 월요일=금토일, 누락분 자동 백필)'
        required: false
        default: ''

concurrency:
  group: daily-dashboard-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve target dates (with backfill)
        id: dates
        env:
          INPUT_DATE: ${{ inputs.date }}
        run: |
          if [ -n "$INPUT_DATE" ]; then
            DATES=$(echo "$INPUT_DATE" | tr ',' ' ')
          else
            DOW=$(TZ=Asia/Seoul date +%u)
            # 기본 — 평일: 어제, 월요일: 금토일 3일치
            if [ "$DOW" = "1" ]; then
              D1=$(TZ=Asia/Seoul date -d '3 days ago' +%Y-%m-%d)
              D2=$(TZ=Asia/Seoul date -d '2 days ago' +%Y-%m-%d)
              D3=$(TZ=Asia/Seoul date -d 'yesterday'  +%Y-%m-%d)
              DATES="$D1 $D2 $D3"
            else
              DATES=$(TZ=Asia/Seoul date -d 'yesterday' +%Y-%m-%d)
            fi
            # 백필 — 지난 7일 중 sales_history.json에 없는 날짜 자동 추가
            BACKFILL=$(python -c "
import json, sys
from datetime import datetime, timedelta
try:
    d=json.load(open('sales_history.json'))
except Exception:
    d={}
today_kst=datetime.utcnow()+timedelta(hours=9)
out=[]
for i in range(1,8):
    target=(today_kst-timedelta(days=i)).strftime('%Y-%m-%d')
    if target not in d or not d[target]:
        out.append(target)
print(' '.join(out))
")
            if [ -n "$BACKFILL" ]; then
              DATES="$DATES $BACKFILL"
            fi
            # 중복 제거
            DATES=$(echo "$DATES" | tr ' ' '\n' | sort -u | tr '\n' ' ')
          fi
          echo "value=$DATES" >> "$GITHUB_OUTPUT"
          echo "Target dates: $DATES"

      - name: Fetch and process each date
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          PROCESSED_ANY=0
          for D in ${{ steps.dates.outputs.value }}; do
            echo "::group::Processing $D"
            if python gdrive_fetch.py --date "$D"; then
              if [ -d "POS_DOWNLOADS/$D" ] && [ -n "$(ls -A POS_DOWNLOADS/$D 2>/dev/null)" ]; then
                python daily_report_generator.py "$D"
                PROCESSED_ANY=1
              else
                echo "[!] $D 다운로드 폴더 비어있음 — 스킵"
              fi
            else
              echo "[!] $D Drive에 파일 없음 — 스킵"
            fi
            echo "::endgroup::"
          done
          if [ "$PROCESSED_ANY" = "0" ]; then
            echo "[i] 처리된 날짜 0개"
          fi

      - name: Update index.html
        run: python update_index.py

      - name: Commit and push
        run: |
          git config user.name  "dashboard-bot"
          git config user.email "dashboard-bot@samchang-dashboard.iam.gserviceaccount.com"
          git add sales_history.json index.html
          if git diff --staged --quiet; then
            echo "변경 없음 — commit 생략 (이미 처리됨)"
          else
            git commit -m "Auto update for ${{ steps.dates.outputs.value }}"
            git push
          fi
