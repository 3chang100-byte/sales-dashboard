name: Daily Dashboard Update

on:
  schedule:
    # 평일(월~금) 12 PM KST = 03:00 UTC
    - cron: '0 3 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: '대상 날짜 YYYY-MM-DD (비워두면 어제 KST)'
        required: false
        default: ''

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve target date
        id: date
        env:
          INPUT_DATE: ${{ inputs.date }}
        run: |
          if [ -n "$INPUT_DATE" ]; then
            DATE="$INPUT_DATE"
          else
            DATE=$(TZ=Asia/Seoul date -d 'yesterday' +%Y-%m-%d)
          fi
          echo "value=$DATE" >> "$GITHUB_OUTPUT"
          echo "Target date: $DATE"

      - name: Fetch from Google Drive
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python gdrive_fetch.py --date "${{ steps.date.outputs.value }}"

      - name: Process sales data
        run: python daily_report_generator.py "${{ steps.date.outputs.value }}"

      - name: Update index.html
        run: python update_index.py

      - name: Commit and push
        run: |
          git config user.name  "dashboard-bot"
          git config user.email "dashboard-bot@samchang-dashboard.iam.gserviceaccount.com"
          git add sales_history.json index.html
          if git diff --staged --quiet; then
            echo "변경 없음 — commit 생략"
          else
            git commit -m "Auto update for ${{ steps.date.outputs.value }}"
            git push
          fi
